<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Roundtable — Swiss Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a0a;--paper:#fff;--mut:#6b6b6b;--line:#0a0a0a;--red:#e5251a;--ease:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}a{color:inherit;text-decoration:none}
.gro{font-family:'Space Grotesk',sans-serif}
.wrap{width:min(1240px,92vw);margin:0 auto}
.rule{border-top:1px solid var(--line)}
.eye{font-family:'Space Grotesk';font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}
.eye .r{color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk';font-weight:600;font-size:14px;padding:13px 22px;border:1px solid var(--ink);transition:.2s var(--ease)}
.btn.fill{background:var(--ink);color:#fff}.btn.fill:hover{background:var(--red);border-color:var(--red)}
.btn.line:hover{background:var(--ink);color:#fff}
/* nav */
nav{position:sticky;top:0;z-index:50;background:var(--paper);border-bottom:1px solid var(--line);height:64px;display:flex;align-items:center}
nav .wrap{display:flex;align-items:center;justify-content:space-between;width:min(1240px,92vw)}
nav b{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:-.01em}
nav .links{display:flex;gap:30px;font-family:'Space Grotesk';font-size:13px;font-weight:500;letter-spacing:.02em}
nav .links a:hover{color:var(--red)}
/* hero — copy left, floating cards right */
.hero{padding:64px 0 60px}
.hero .grid{display:grid;grid-template-columns:1.08fr .92fr;gap:48px;align-items:center}
.hero h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(40px,5.4vw,80px);line-height:.96;letter-spacing:-.035em;margin:22px 0 0}
.hero h1 em{font-style:normal;color:var(--red)}
.hero .sub{font-size:17px;line-height:1.55;color:var(--ink);max-width:400px;margin:22px 0 24px}
.hero .ctas{display:flex;gap:12px;flex-wrap:wrap}
.hero .num{font-family:'Space Grotesk';font-size:12px;letter-spacing:.12em;color:var(--mut);margin-top:28px;display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:10px}
/* floating cards */
.cloud{position:relative;height:clamp(520px,56vw,660px)}
.fcard{position:absolute;width:clamp(150px,15.5vw,186px);aspect-ratio:3/4;border-radius:2px;overflow:hidden;background:#f2f2f2;border:1px solid var(--ink);box-shadow:7px 7px 0 var(--ink);animation:bob 6s ease-in-out infinite}
.fcard:nth-child(2){animation-delay:-2.4s}.fcard:nth-child(3){animation-delay:-1.2s}.fcard:nth-child(4){animation-delay:-3.1s}
.fcard .ph{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.06)}
.fcard:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 46%,rgba(0,0,0,.72))}
.fcard .say{position:absolute;left:9px;right:9px;top:10px;z-index:3;background:#fff;border:1px solid var(--ink);border-radius:2px;padding:8px 11px;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;line-height:1.3;color:var(--ink);box-shadow:3px 3px 0 var(--ink)}
.fcard .meta{position:absolute;left:13px;right:12px;bottom:12px;z-index:2;color:#fff}
.fcard .meta b{display:block;font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:-.02em}
.fcard .meta span{font-family:'DM Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:rgba(255,255,255,.82)}
.fcard.a{top:0;left:0;rotate:-2deg}.fcard.b{top:8%;right:0;rotate:2deg}.fcard.c{bottom:0;left:28%;rotate:-1deg}
.livebubble{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;width:min(292px,76%);background:#fff;border:1px solid var(--ink);border-radius:2px;padding:17px 19px;box-shadow:6px 6px 0 var(--ink)}
.livebubble .lab{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:7px;margin-bottom:11px}
.livebubble .lab i{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.livebubble q{font-family:'Space Grotesk';font-size:17px;font-weight:500;line-height:1.3;color:var(--ink);quotes:none}
.livebubble q b{font-weight:700;color:var(--red)}
.livebubble .resp{display:flex;align-items:center;gap:8px;margin-top:13px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.03em}
.livebubble .mini{display:flex}.livebubble .mini img{width:28px;height:28px;border-radius:2px;border:1px solid #fff;object-fit:cover;filter:grayscale(1);margin-left:-7px}.livebubble .mini img:first-child{margin-left:0}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
/* section header */
.sec{padding:64px 0}
.sechead{display:grid;grid-template-columns:.3fr 1fr;gap:20px;align-items:baseline;margin-bottom:40px}
.sechead h2{font-family:'Space Grotesk';font-weight:600;font-size:clamp(28px,3.4vw,46px);letter-spacing:-.025em;line-height:1}
/* steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line)}
.step{padding:28px 26px 30px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.step:last-child{border-right:0}
.step .bn{font-family:'Space Grotesk';font-size:46px;font-weight:500;color:var(--red);line-height:1;letter-spacing:-.03em}
.step h3{font-family:'Space Grotesk';font-weight:600;font-size:21px;margin:18px 0 8px;letter-spacing:-.01em}
.step p{font-size:14.5px;color:var(--mut);line-height:1.6;max-width:280px}
/* demo transcript */
.demo{background:var(--ink);color:#fff;padding:64px 0}
.demo .sechead h2{color:#fff}.demo .sechead .eye{color:#fff}.demo .sechead .eye .r{color:#ff6a5e}
.tx{border-top:1px solid rgba(255,255,255,.22);max-width:820px}
.q{padding:20px 0;border-bottom:1px solid rgba(255,255,255,.16);font-family:'Space Grotesk';font-size:clamp(20px,2.4vw,30px);font-weight:500;letter-spacing:-.02em;line-height:1.2}
.q .lab{display:block;font-family:'Space Grotesk';font-size:11px;letter-spacing:.16em;color:#ff6a5e;text-transform:uppercase;margin-bottom:12px;font-weight:600}
.turn{display:grid;grid-template-columns:54px 1fr;gap:18px;padding:22px 0;border-bottom:1px solid rgba(255,255,255,.16);align-items:start}
.turn img{width:54px;height:54px;object-fit:cover;filter:grayscale(1);border:1px solid rgba(255,255,255,.3)}
.turn .who{font-family:'Space Grotesk';font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#fff;margin-bottom:7px}
.turn .who span{color:rgba(255,255,255,.5)}
.turn p{font-size:16px;line-height:1.55;color:rgba(255,255,255,.9);max-width:560px}
/* roster */
.roster{display:grid;grid-template-columns:repeat(4,1fr);border-left:1px solid var(--line);border-top:1px solid var(--line)}
.rc{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:0}
.rc .ph{aspect-ratio:4/5;overflow:hidden;background:#f2f2f2;border-bottom:1px solid var(--line)}
.rc .ph img{width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.04);transition:.4s var(--ease)}
.rc:hover .ph img{filter:grayscale(0)}
.rc .m{padding:12px 14px 16px;display:flex;justify-content:space-between;align-items:baseline}
.rc .m b{font-family:'Space Grotesk';font-weight:600;font-size:15px}
.rc .m span{font-family:'Space Grotesk';font-size:10.5px;letter-spacing:.04em;color:var(--mut);text-align:right}
/* close */
.close{padding:90px 0 96px;text-align:center}
.close h2{font-family:'Space Grotesk';font-weight:700;font-size:clamp(40px,6vw,84px);letter-spacing:-.035em;line-height:.96}
.close p{color:var(--mut);font-size:17px;margin:18px auto 30px;max-width:420px}
footer{border-top:1px solid var(--line);padding:26px 0}
footer .wrap{display:flex;justify-content:space-between;align-items:center;font-family:'Space Grotesk';font-size:12px;letter-spacing:.04em;color:var(--mut);flex-wrap:wrap;gap:10px}
.back{position:fixed;left:16px;bottom:16px;z-index:60;font-family:'Space Grotesk';font-size:12px;font-weight:600;background:var(--ink);color:#fff;padding:9px 14px;border-radius:2px}
@media(max-width:860px){.hero .grid,.sechead{grid-template-columns:1fr}.cloud{order:-1}.steps{grid-template-columns:1fr}.roster{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<a class="back" href="hero-concepts.html">← all 5 designs</a>
<nav><div class="wrap"><b>Roundtable</b><div class="links"><a href="#how">How it works</a><a href="#demo">Demo</a><a href="#agents">Agents</a><a href="#start" style="color:var(--red)">Start →</a></div></div></nav>

<header class="hero"><div class="wrap grid">
  <div class="lead">
    <div class="eye"><span class="r">●</span> Multi-expert AI &nbsp;/&nbsp; <span id="eye"></span></div>
    <h1 id="h1"></h1>
    <p class="sub" id="sub"></p>
    <div class="ctas"><a class="btn fill" href="#agents" id="cta1"></a><a class="btn line" href="#demo" id="cta2"></a></div>
    <div class="num"><span>EST. 2026</span><span>FIG. 01 — THE PANEL</span></div>
  </div>
  <div class="cloud" id="cloud"></div>
</div></header>

<section class="sec wrap" id="how">
  <div class="sechead"><div class="eye"><span class="r">/</span> Process</div><h2>Three steps to a sharper answer.</h2></div>
  <div class="steps" id="steps"></div>
</section>

<section class="demo" id="demo"><div class="wrap">
  <div class="sechead"><div class="eye"><span class="r">/</span> In the room</div><h2 id="demoTitle"></h2></div>
  <div class="tx" id="tx"></div>
</div></section>

<section class="sec wrap" id="agents">
  <div class="sechead"><div class="eye"><span class="r">/</span> The roster</div><h2 id="rosterTitle"></h2></div>
  <div class="roster" id="roster"></div>
</section>

<section class="close" id="start"><div class="wrap">
  <h2 id="closeTitle"></h2><p id="closeSub"></p>
  <a class="btn fill" href="#" style="font-size:15px;padding:15px 28px">Start a session →</a>
</div></section>

<footer><div class="wrap"><span>ROUNDTABLE — MULTI-EXPERT AI</span><span>SWISS EDITORIAL · 01 / 05</span></div></footer>

<script src="rt-data.js"></script>
<script>
const C=RT.copy;
eye.textContent=C.eyebrow; h1.innerHTML=C.h1.replace('roundtable','<em>roundtable</em>'); sub.textContent=C.sub;
cta1.textContent=C.ctaPrimary; cta2.textContent='▸ '+C.ctaSecondary;
demoTitle.textContent=C.demoTitle; rosterTitle.textContent=C.rosterTitle;
closeTitle.textContent=C.closeTitle; closeSub.textContent=C.closeSub;
cloud.innerHTML=RT.heroCardsHTML();
steps.innerHTML=C.steps.map(s=>`<div class="step"><div class="bn">${s.n}</div><h3>${s.title}</h3><p>${s.body}</p></div>`).join('');
tx.innerHTML=`<div class="q"><span class="lab">You asked</span>"${RT.demo.q}"</div>`+RT.demo.turns.map(t=>`<div class="turn"><img loading="lazy" src="${t.img}" alt=""><div><div class="who">${t.name} <span>· ${t.role}</span></div><p>${t.text}</p></div></div>`).join('');
roster.innerHTML=RT.roster.map(p=>`<div class="rc"><div class="ph"><img loading="lazy" src="${p.img}" alt="${p.name}"></div><div class="m"><b>${p.name}</b><span>${p.role}</span></div></div>`).join('');
</script>
</body>
</html>
