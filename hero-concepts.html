<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Roundtable — 5 design directions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bar:54px;--ink:#1d1d1f;--soft:#6e6e73;--line:rgba(0,0,0,.12);--blue:#0071e3;--ease:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,system-ui,sans-serif;background:#e9e9ec;color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.topbar{position:fixed;inset:0 0 auto 0;height:var(--bar);z-index:10;display:flex;align-items:center;gap:16px;
  padding:0 clamp(10px,2vw,18px);background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:9px;flex:none}
.brand .mk{width:26px;height:26px;border-radius:8px;background:linear-gradient(140deg,#4f9dff,#0071e3);display:grid;place-items:center;box-shadow:0 6px 14px -6px rgba(0,113,227,.6)}
.brand .mk svg{width:14px;height:14px;fill:#fff}
.brand b{font-size:14.5px;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.brand .tag{font-size:11px;color:var(--soft);white-space:nowrap}
.seg{display:flex;gap:4px;margin:0 auto;background:#f0f0f3;border:1px solid var(--line);border-radius:999px;padding:4px;overflow-x:auto;scrollbar-width:none;max-width:100%}
.seg::-webkit-scrollbar{display:none}
.seg button{display:flex;align-items:baseline;gap:7px;font:inherit;font-size:13px;font-weight:600;color:var(--soft);background:none;border:0;cursor:pointer;padding:7px 15px;border-radius:999px;white-space:nowrap;transition:.2s var(--ease)}
.seg button .n{font-size:10px;font-weight:700;color:#b5b5bd;font-variant-numeric:tabular-nums}
.seg button:hover{color:var(--ink)}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06),0 4px 12px -6px rgba(0,0,0,.25)}
.seg button.on .n{color:var(--blue)}
.open{flex:none;font-size:12px;font-weight:600;color:var(--blue);padding:7px 12px;border-radius:8px;white-space:nowrap}
.open:hover{background:#eef4ff}
.stage{position:fixed;top:var(--bar);left:0;right:0;bottom:0;background:#fff}
.stage iframe{width:100%;height:100%;border:0;display:block}
.stage .load{position:absolute;inset:0;display:grid;place-items:center;color:var(--soft);font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s}
.stage.busy .load{opacity:1}
@media(max-width:720px){.brand .tag{display:none}.seg button{padding:7px 11px;font-size:12px}}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="#" onclick="go('apple');return false">
    <span class="mk"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><circle cx="12" cy="4.2" r="2"/><circle cx="12" cy="19.8" r="2"/><circle cx="4.2" cy="8" r="2"/><circle cx="19.8" cy="8" r="2"/><circle cx="4.2" cy="16" r="2"/><circle cx="19.8" cy="16" r="2"/></svg></span>
    <b>Roundtable</b><span class="tag">· 5 design directions</span>
  </a>
  <div class="seg" id="seg"></div>
  <a class="open" id="openLink" target="_blank" rel="noopener">Open ↗</a>
</div>
<div class="stage busy" id="stage">
  <div class="load">Loading…</div>
  <iframe id="frame" title="design preview" onload="document.getElementById('stage').classList.remove('busy')"></iframe>
</div>
<script>
const DESIGNS=[
  {id:'apple', n:'01', label:'Apple',  file:'design-apple.html'},
  {id:'swiss', n:'02', label:'Swiss',  file:'design-1-swiss.html'},
  {id:'explain',n:'03', label:'Explainer', file:'design-explainer.html'},
  {id:'vivid', n:'04', label:'Vivid',  file:'design-vivid.html'},
  {id:'glass', n:'05', label:'Glass',  file:'design-glass.html'}
];
const seg=document.getElementById('seg'), frame=document.getElementById('frame'),
      stage=document.getElementById('stage'), openLink=document.getElementById('openLink');
seg.innerHTML=DESIGNS.map(d=>`<button data-id="${d.id}" onclick="go('${d.id}')"><span class="n">${d.n}</span>${d.label}</button>`).join('');
let cur=null;
function go(id){
  const d=DESIGNS.find(x=>x.id===id)||DESIGNS[0];
  if(cur!==d.id){stage.classList.add('busy');frame.setAttribute('src',d.file+'?t='+Date.now());cur=d.id;} // cache-bust so each design always loads fresh
  openLink.setAttribute('href',d.file);
  document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on',b.dataset.id===d.id));
  if(location.hash.slice(1)!==d.id)history.replaceState(null,'','#'+d.id);
  document.title='Roundtable — '+d.label+' design';
}
go((location.hash.slice(1))||'apple');
addEventListener('hashchange',()=>go(location.hash.slice(1)));
</script>
</body>
</html>
