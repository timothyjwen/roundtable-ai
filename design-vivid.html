<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Roundtable — Bold Vivid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#ffffff;--ink:#13111c;--soft:#5b5870;--faint:#8b88a0;--line:rgba(19,17,28,.10);
  --g1:#6d28f5;--g2:#b026ff;--g3:#3b82f6;--soft-v:#f3eefe;--ease:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
.wrap{width:min(1200px,92vw);margin:0 auto}
h1,h2,h3{font-weight:800;letter-spacing:-.035em;line-height:1.0;text-wrap:balance}
.grad{background:linear-gradient(110deg,var(--g1),var(--g2) 55%,var(--g3));-webkit-background-clip:text;background-clip:text;color:transparent}
.r{opacity:0;transform:translateY(30px);transition:opacity .8s ease,transform .9s var(--ease)}.r.in{opacity:1;transform:none}
.d1{transition-delay:.07s}.d2{transition-delay:.14s}.d3{transition-delay:.21s}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--g1);background:var(--soft-v);padding:7px 14px;border-radius:999px}
.eyebrow i{width:7px;height:7px;border-radius:50%;background:linear-gradient(var(--g1),var(--g2));animation:pp 1.6s infinite}@keyframes pp{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;transition:.25s var(--ease)}
.btn.grad-bg{background:linear-gradient(110deg,var(--g1),var(--g2));color:#fff;box-shadow:0 16px 34px -14px rgba(109,40,245,.6)}
.btn.grad-bg:hover{transform:translateY(-2px);box-shadow:0 22px 44px -14px rgba(109,40,245,.7)}
.btn.ghost{border:2px solid var(--line);color:var(--ink)}.btn.ghost:hover{border-color:var(--g1);color:var(--g1)}
/* nav */
nav{position:fixed;inset:0 0 auto 0;z-index:60;height:62px;display:flex;align-items:center;background:rgba(255,255,255,.82);backdrop-filter:blur(16px);border-bottom:1px solid transparent;transition:.3s}
nav.scrolled{border-bottom-color:var(--line)}
nav .wrap{display:flex;align-items:center;justify-content:space-between}
nav b{font-size:19px;font-weight:800;letter-spacing:-.03em}
nav .lk{display:flex;gap:28px;font-size:13.5px;font-weight:600;color:var(--soft)}nav .lk a:hover{color:var(--g1)}
nav .try{font-size:13.5px;font-weight:700;background:linear-gradient(110deg,var(--g1),var(--g2));color:#fff;padding:9px 18px;border-radius:11px}
/* hero */
.hero{padding:124px 0 84px;position:relative}
.hero .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:46px;align-items:center}
.blob{position:absolute;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.5}
.blob.b1{width:480px;height:480px;background:radial-gradient(circle,#d9c7ff,transparent 65%);top:-60px;left:-80px}
.blob.b2{width:440px;height:440px;background:radial-gradient(circle,#bfe0ff,transparent 65%);top:0;right:-80px}
.hero h1{font-size:clamp(42px,5.8vw,80px);font-weight:900;margin:20px 0 0;max-width:12ch}
.hero .sub{font-size:clamp(17px,1.5vw,21px);color:var(--soft);max-width:470px;margin:22px 0 0;font-weight:500;line-height:1.5}
.hero .cta{display:flex;gap:14px;margin-top:30px;flex-wrap:wrap}
/* floating cards */
.cloud{position:relative;height:clamp(440px,46vw,520px)}
.fcard{position:absolute;background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px 17px;box-shadow:0 22px 50px -26px rgba(19,17,28,.28);min-width:178px;animation:bob 5s ease-in-out infinite}
.fcard:nth-child(2){animation-delay:-2.4s}.fcard:nth-child(3){animation-delay:-1.2s}.fcard:nth-child(4){animation-delay:-3.1s}
.fcard .top{display:flex;align-items:center;gap:12px}
.fcard .av{width:42px;height:42px;border-radius:12px;object-fit:cover;flex:none}
.fcard .nm{font-size:16px;font-weight:800;letter-spacing:-.02em}
.fcard .rl{font-size:11.5px;color:var(--faint);margin-top:1px;font-weight:500}
.fcard .pill{display:inline-block;margin-top:12px;font-size:10.5px;font-weight:700;color:#fff;background:linear-gradient(110deg,var(--g1),var(--g2));padding:4px 11px;border-radius:999px}
.fcard.a{top:1%;left:0}.fcard.b{top:8%;right:0}.fcard.c{bottom:8%;left:1%}.fcard.d{bottom:0;right:3%}
.livebubble{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;width:min(304px,78%);background:#fff;border:1px solid var(--line);border-radius:22px;padding:19px 21px;box-shadow:0 30px 70px -30px rgba(109,40,245,.4)}
.livebubble .lab{font-size:11px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:11px;background:linear-gradient(110deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
.livebubble .lab i{width:7px;height:7px;border-radius:50%;background:linear-gradient(var(--g1),var(--g2));animation:pp 1.6s infinite}
.livebubble q{font-size:17px;font-weight:600;line-height:1.35;color:var(--ink);quotes:none}
.livebubble q b{font-weight:800;background:linear-gradient(110deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
.livebubble .resp{display:flex;align-items:center;gap:9px;margin-top:13px;font-size:11.5px;color:var(--faint)}
.livebubble .mini{display:flex}.livebubble .mini img{width:22px;height:22px;border-radius:50%;border:2px solid #fff;object-fit:cover;margin-left:-7px}.livebubble .mini img:first-child{margin-left:0}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
/* sections */
.sec{padding:clamp(80px,10vw,128px) 0}
.shead{text-align:center;max-width:720px;margin:0 auto 56px}
.shead h2{font-size:clamp(34px,5vw,62px);font-weight:900}
.shead p{color:var(--soft);font-size:clamp(17px,1.9vw,21px);margin-top:16px;font-weight:500}
/* why */
.bento{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.bcard{border-radius:26px;padding:32px 28px;border:1px solid var(--line);background:#fff;transition:.3s var(--ease)}
.bcard:hover{transform:translateY(-4px);box-shadow:0 26px 60px -34px rgba(19,17,28,.3)}
.bcard:first-child{background:linear-gradient(150deg,var(--g1),var(--g2));color:#fff;border:0}
.bcard .k{font-size:30px;font-weight:900;margin-bottom:14px;opacity:.9}
.bcard:first-child .k{color:#fff}.bcard:not(:first-child) .k{background:linear-gradient(120deg,var(--g1),var(--g2));-webkit-background-clip:text;background-clip:text;color:transparent}
.bcard h3{font-size:23px;font-weight:800;margin-bottom:9px}
.bcard p{font-size:15px;line-height:1.6;color:var(--soft)}.bcard:first-child p{color:rgba(255,255,255,.86)}
/* steps */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.stp{border-radius:24px;border:1px solid var(--line);padding:30px 26px;position:relative;overflow:hidden}
.stp .n{display:inline-grid;place-items:center;width:40px;height:40px;border-radius:12px;background:var(--soft-v);color:var(--g1);font-weight:800;font-size:16px;margin-bottom:16px}
.stp h3{font-size:21px;font-weight:800;margin-bottom:8px}.stp p{color:var(--soft);font-size:15px;line-height:1.6}
/* roster */
.roster{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.face{border-radius:22px;overflow:hidden;position:relative;aspect-ratio:4/5;background:#eee}
.face img{width:100%;height:100%;object-fit:cover;transition:.5s var(--ease)}.face:hover img{transform:scale(1.05)}
.face:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(19,17,28,.8))}
.face .m{position:absolute;left:16px;right:16px;bottom:14px;z-index:2;color:#fff}
.face .m b{display:block;font-size:17px;font-weight:800;letter-spacing:-.02em}.face .m span{font-size:12px;color:rgba(255,255,255,.78)}
/* close */
.close{margin:0 auto;width:min(1100px,92vw);border-radius:36px;padding:clamp(64px,9vw,110px) 30px;text-align:center;background:linear-gradient(135deg,var(--g1),var(--g2) 60%,var(--g3));color:#fff}
.close h2{font-size:clamp(40px,6vw,80px);font-weight:900}
.close p{font-size:clamp(17px,1.9vw,21px);margin:18px auto 30px;max-width:480px;color:rgba(255,255,255,.9);font-weight:500}
.close .btn{background:#fff;color:var(--g1)}
.cw{padding:clamp(50px,7vw,90px) 0}
footer{padding:30px 0;color:var(--faint);font-size:12px}.foot{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
@media(max-width:880px){nav .lk{display:none}.bento,.steps{grid-template-columns:1fr}.roster{grid-template-columns:repeat(2,1fr)}.hero .grid{grid-template-columns:1fr;gap:28px}.cloud{order:-1}}
@media(prefers-reduced-motion:reduce){.r{opacity:1;transform:none}*{animation:none!important}}
</style>
</head>
<body>
<nav id="nav"><div class="wrap"><b>Round<span class="grad">table</span></b><div class="lk"><a href="#why">Why</a><a href="#how">How it works</a><a href="#agents">Agents</a></div><a class="try" href="#start">Try free</a></div></nav>

<main>
  <section class="hero">
    <span class="blob b1"></span><span class="blob b2"></span>
    <div class="wrap grid">
      <div class="lead">
        <span class="eyebrow r"><i></i>MULTI-EXPERT AI</span>
        <h1 class="r d1" id="h1"></h1>
        <p class="sub r d2" id="sub"></p>
        <div class="cta r d3"><a class="btn grad-bg" href="#agents" id="cta1"></a><a class="btn ghost" href="#how" id="cta2"></a></div>
      </div>
      <div class="cloud r d2" id="cloud"></div>
    </div>
  </section>

  <section class="sec" id="why"><div class="wrap">
    <div class="shead r"><h2 id="whyTitle"></h2><p id="whySub"></p></div>
    <div class="bento" id="bento"></div>
  </div></section>

  <section class="sec" id="how"><div class="wrap">
    <div class="shead r"><h2>Three steps to a sharper answer.</h2></div>
    <div class="steps" id="steps"></div>
  </div></section>

  <section class="sec" id="agents"><div class="wrap">
    <div class="shead r"><h2 id="rosterTitle"></h2><p id="rosterSub"></p></div>
    <div class="roster" id="roster"></div>
  </div></section>

  <section class="cw"><div class="close r" id="start">
    <h2 id="closeTitle"></h2><p id="closeSub"></p>
    <a class="btn" href="#">Start a session →</a>
  </div></section>
</main>
<footer><div class="wrap foot"><span>Roundtable · Multi-expert AI</span><span>AI-generated discussions for exploration. Not professional advice.</span></div></footer>

<script src="rt-data.js"></script>
<script>
const C=RT.copy;
h1.innerHTML=C.h1.replace('roundtable','<span class="grad">roundtable</span>'); sub.textContent=C.sub;
cta1.textContent=C.ctaPrimary; cta2.textContent=C.ctaSecondary;
whyTitle.textContent=C.whyTitle; whySub.textContent=C.whySub;
rosterTitle.textContent=C.rosterTitle; rosterSub.textContent=C.rosterSub;
closeTitle.textContent=C.closeTitle; closeSub.textContent=C.closeSub;
cloud.innerHTML=RT.heroCardsHTML();
bento.innerHTML=C.why.map((w,i)=>`<article class="bcard"><div class="k">0${i+1}</div><h3>${w.title}</h3><p>${w.body}</p></article>`).join('');
steps.innerHTML=C.steps.map(s=>`<div class="stp"><div class="n">${s.n.replace('0','')}</div><h3>${s.title}</h3><p>${s.body}</p></div>`).join('');
roster.innerHTML=RT.roster.map(p=>`<div class="face"><img loading="lazy" src="${p.img}" alt="${p.name}"><div class="m"><b>${p.name}</b><span>${p.role}</span></div></div>`).join('');
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.13,rootMargin:'0px 0px -6% 0px'});
document.querySelectorAll('.r').forEach(el=>io.observe(el));
addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>10),{passive:true});
if(matchMedia('(prefers-reduced-motion: reduce)').matches)document.querySelectorAll('.r').forEach(el=>el.classList.add('in'));
</script>
</body>
</html>
